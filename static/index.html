<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedScribe AI | Real-time Medical Transcription</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-areas: "transcript soap";
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
            overflow: hidden;
        }

        .scribe-container {
            grid-area: transcript;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .scribe-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-light);
            color: var(--primary);
        }

        .status-badge.recording {
            background: #fef2f2;
            color: var(--danger);
        }

        .status-badge.generating {
            background: #f0fdf4;
            color: var(--success);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.5);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .transcript-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .transcript-message {
            max-width: 85%;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
        }

        .transcription-final {
            align-self: flex-start;
            background: #f1f5f9;
            color: #334155;
            border-bottom-left-radius: 2px;
        }

        .ai-response {
            align-self: flex-start;
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 500;
        }

        .insights-panel {
            grid-area: insights;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            border-radius: 20px;
            padding: 1.25rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .insights-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .insights-content {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .soap-card {
            grid-area: soap;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            height: 100%;
            overflow: hidden;
        }

        .soap-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--primary);
        }

        .soap-content {
            font-size: 1rem;
            color: #334155;
            overflow-y: auto;
            flex: 1;
            padding: 0.5rem;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
        }

        .soap-content h1, .soap-content h2 {
            font-size: 1.25rem;
            color: var(--primary);
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 0.25rem;
        }

        .soap-content h3, .soap-content h4 {
            font-size: 1.1rem;
            color: #1e293b;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
        }

        .soap-content p {
            margin-bottom: 1rem;
        }

        .soap-content ul, .soap-content ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .soap-content li {
            margin-bottom: 0.35rem;
        }

        .soap-content strong {
            color: #0f172a;
            font-weight: 700;
        }

        .controls {
            padding: 1.25rem;
            background: white;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        button {
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn-start {
            background: var(--primary);
            color: white;
        }

        .btn-stop {
            background: var(--danger);
            color: white;
            display: none;
        }

        .btn-start:hover,
        .btn-stop:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #visualizer {
            width: 100%;
            height: 40px;
            display: none;
        }
    .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 1.5rem;
            color: var(--primary);
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(37, 99, 235, 0.05);
            border-radius: 16px;
            border: 1px dashed rgba(37, 99, 235, 0.2);
            padding: 2rem;
            text-align: center;
        }

        .loader {
            display: flex;
            gap: 0.6rem;
        }

        .loader div {
            width: 14px;
            height: 14px;
            background-color: var(--primary);
            border-radius: 100%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader .bounce1 { animation-delay: -0.32s; }
        .loader .bounce2 { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); } 
            40% { transform: scale(1.0); }
        }

        @media (max-width: 1024px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }
            main {
                grid-template-areas: "transcript" "soap";
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
                height: auto;
                overflow-y: visible;
                padding: 1rem;
            }
            .scribe-container {
                height: 70vh;
            }
            .soap-card {
                min-height: 50vh;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
                align-items: flex-start;
            }
            .ui-controls {
                flex-direction: column;
                align-items: stretch !important;
            }
            .control-group {
                min-width: 100% !important;
            }
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header>
        <div style="display: flex; flex-direction: column; gap: 0.1rem;">
            <div class="logo">MedScribe <span>AI</span></div>
            <div style="font-size: 0.75rem; color: #64748b; font-weight: 500; letter-spacing: 0.02em;">
                Powered by <span style="color: #4285F4; font-weight: 700;">Google Cloud</span>
            </div>
            </div>
        <div class="status-badge" id="statusBadge">
            <div id="statusPulse"></div>
            <span id="statusText">Ready for session</span>
        </div>
    </header>

    <main>
        <div class="scribe-container">
            <div class="scribe-header">
                <h2>Session Transcript</h2>
                <canvas id="visualizer"></canvas>
            </div>
            <div class="transcript-area" id="transcriptArea"></div>
            <!-- Model and VAD Controls -->
            <div class="ui-controls"
                style="padding: 1rem 1.5rem; background: #fff; border-top: 1px solid rgba(0,0,0,0.05); display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <div class="control-group"
                    style="display: flex; flex-direction: column; gap: 0.25rem; flex: 1; min-width: 200px;">
                    <label for="sttModel"
                        style="font-size: 0.75rem; font-weight: 600; color: var(--secondary);">Speech-to-Text Model
                        (V2)</label>
                    <select id="sttModel"
                        style="padding: 0.5rem; border-radius: 8px; border: 1px solid #e2e8f0; font-family: inherit;">
                        <option value="chirp_3">Chirp 3 (Advanced Multilingual)</option>
                        <option value="chirp_2">Chirp 2 (LLM Streaming)</option>
                    </select>
                </div>
                <div class="control-group"
                    style="display: flex; flex-direction: column; gap: 0.25rem; flex: 1; min-width: 200px;">
                    <label for="llmModel" style="font-size: 0.75rem; font-weight: 600; color: var(--secondary);">AI
                        Model (Diarization & Notes)</label>
                    <select id="llmModel"
                        style="padding: 0.5rem; border-radius: 8px; border: 1px solid #e2e8f0; font-family: inherit;">
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                        <option value="gemini-3.1-pro">Gemini 3.1 Pro</option>
                    </select>
                </div>
                <div class="control-group toggle-group"
                    style="display: flex; align-items: center; gap: 0.5rem; margin-top: auto; padding-bottom: 0.5rem;">
                    <input type="checkbox" id="enableVad" style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                    <label for="enableVad"
                        style="font-size: 0.875rem; font-weight: 500; color: var(--text); cursor: pointer;">Enable Edge
                        VAD (Silence Trimming)</label>
                </div>
            </div>

            <div class="controls">
                <button class="btn-start" id="startBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                    </svg>
                    Start Session
                </button>
                <button class="btn-stop" id="stopBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="6" width="12" height="12" rx="2" />
                    </svg>
                    End Session
                </button>
            </div>
        </div>


        <aside class="soap-card">
            <div class="soap-title">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                </svg>
                SOAP Summary
            </div>
            <div class="soap-content" id="soapContent">
                The summary will be generated automatically at the end of the session.
            </div>
        </aside>
    </main>

    <script>
        let ws;
        let audioContext;
        let source;
        let workletNode;
        let isStopping = false;
        let currentSessionId = null;
        let lastSpeechTime = 0;
        let isSpeaking = true;
        let mediaStream = null;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const transcriptArea = document.getElementById('transcriptArea');
        const soapContent = document.getElementById('soapContent');

        const statusText = document.getElementById('statusText');
        const statusBadge = document.getElementById('statusBadge');
        const statusPulse = document.getElementById('statusPulse');
        const visualizer = document.getElementById('visualizer');
        const canvasCtx = visualizer.getContext('2d');
        const sttModelSelect = document.getElementById('sttModel');
        const llmModelSelect = document.getElementById('llmModel');
        const enableVadCheck = document.getElementById('enableVad');

        async function startSession() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentSessionId = Math.random().toString(36).substring(7);
                connectWebSocket();
                setupAudioProcessing(mediaStream);

                startBtn.style.display = 'none';
                stopBtn.style.display = 'flex';
                statusText.innerText = 'Listening...';
                statusBadge.classList.add('recording');
                statusPulse.classList.add('pulse');
                visualizer.style.display = 'block';
            } catch (err) {
                alert('Mic access error: ' + err.message);
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const sttModel = sttModelSelect.value;
            const llmModel = llmModelSelect.value;

            const url = `${protocol}//${window.location.host}/ws/scribe/${currentSessionId}?stt_model=${sttModel}&llm_model=${llmModel}`;
            console.log("Connecting to WebSocket:", url);
            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                console.log("WebSocket connected.");
                if (statusText.innerText === 'Reconnecting...') {
                    statusText.innerText = 'Listening...';
                }
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'transcription') {
                        updateTranscript(data.content, 'transcription-final', data.is_final);
                    } else if (data.type === 'text') {
                        if (isStopping || data.content.includes('SOAP') || data.content.length > 500) {
                            let formattedContent = data.content.replace(/\*\*(Doctor|Patient|Speaker \d+):\*\*/gi, '\n\n**$1:**');
                            soapContent.innerHTML = marked.parse(formattedContent);
                            statusText.innerText = 'Session Finished';
                            statusBadge.classList.remove('generating');
                            startBtn.style.display = 'flex';
                        } else {
                            // Insights panel removed, ignoring real-time insights content update
                        }
                    }
                } catch (e) { console.error('WS parse error:', e); }
            };

            ws.onclose = () => {
                console.log("WebSocket closed.");
                if (!isStopping) {
                    statusText.innerText = 'Reconnecting...';
                    setTimeout(() => {
                        if (!isStopping) connectWebSocket();
                    }, 2000);
                }
            };

            ws.onerror = (err) => {
                console.error("WebSocket error:", err);
            };
        }

        async function setupAudioProcessing(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            await audioContext.audioWorklet.addModule('/static/recorder-processor.js');
            source = audioContext.createMediaStreamSource(stream);
            workletNode = new AudioWorkletNode(audioContext, 'recorder-processor');

            workletNode.port.onmessage = (event) => {
                const enableVad = enableVadCheck.checked;
                const int16Array = new Int16Array(event.data);

                if (enableVad) {
                    let sum = 0;
                    for (let i = 0; i < int16Array.length; i++) sum += int16Array[i] * int16Array[i];
                    const rms = Math.sqrt(sum / int16Array.length);
                    const threshold = 100; // Threshold for speech

                    if (rms > threshold) {
                        lastSpeechTime = Date.now();
                        if (!isSpeaking) {
                            isSpeaking = true;
                            if (statusText.innerText.includes('Silence Trimmed')) {
                                statusText.innerText = 'Listening...';
                            }
                        }
                    } else if (isSpeaking && Date.now() - lastSpeechTime > 4000) { // 4s hangover
                        isSpeaking = false;
                        statusText.innerText = 'Listening (Silence Trimmed)...';
                    }
                } else {
                    isSpeaking = true;
                    if (statusText.innerText.includes('Silence Trimmed')) {
                        statusText.innerText = 'Listening...';
                    }
                }

                if (isSpeaking && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(event.data);
                    const float32Array = new Float32Array(int16Array.length);
                    for (let i = 0; i < int16Array.length; i++) float32Array[i] = int16Array[i] / 0x7FFF;
                    drawVisualizer(float32Array);
                }
            };

            source.connect(workletNode);
            workletNode.connect(audioContext.destination);
        }

        function drawVisualizer(data) {
            canvasCtx.fillStyle = 'rgba(255,255,255,0)';
            canvasCtx.clearRect(0, 0, visualizer.width, visualizer.height);
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeStyle = '#2563eb';
            canvasCtx.beginPath();
            const sliceWidth = visualizer.width / data.length;
            let x = 0;
            for (let i = 0; i < data.length; i++) {
                const v = data[i] * 50;
                const y = visualizer.height / 2 + v;
                if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.stroke();
        }

            let activeParagraph = null;
                                        let liveCaptionBubble = null;

        function updateTranscript(text, className, isFinal) {
            // Handle tentative streaming text
            if (!isFinal) {
                if (!liveCaptionBubble) {
                    liveCaptionBubble = document.createElement('div');
                    liveCaptionBubble.className = `transcript-message transcription-final`;
                    liveCaptionBubble.style.opacity = "0.7";
                    liveCaptionBubble.style.color = "var(--primary)";
                    liveCaptionBubble.style.fontStyle = "italic";
                    transcriptArea.appendChild(liveCaptionBubble);
                }
                liveCaptionBubble.innerText = text;
                transcriptArea.scrollTop = transcriptArea.scrollHeight;
                return;
            }

            // On final block, purge tentative DOM
            if (liveCaptionBubble) {
                liveCaptionBubble.remove();
                liveCaptionBubble = null;
            }

            // Construct or append to permanent active paragraph
            if (!activeParagraph) {
                activeParagraph = document.createElement('div');
                activeParagraph.className = `transcript-message transcription-final`;
                activeParagraph.innerHTML = `<span class="final-text"></span>`;
                transcriptArea.appendChild(activeParagraph);
            }

            const finalTextEl = activeParagraph.querySelector('.final-text');
            const currentFinalText = finalTextEl.innerText;
            const spacer = (currentFinalText.length > 0 && !currentFinalText.endsWith(' ')) ? ' ' : '';
            finalTextEl.innerText += spacer + text;

            // Break into a new paragraph box if the sentence ends with strong punctuation
            if (text.trim().match(/[.!?]$/)) {
                activeParagraph = null;
            }

            transcriptArea.scrollTop = transcriptArea.scrollHeight;
        }

        function stopRecording() {
            if (isStopping) return;
            isStopping = true;
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'control', action: 'end_session' }));

            if (workletNode) workletNode.disconnect();
            if (source) source.disconnect();
            if (audioContext) audioContext.close();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());

            stopBtn.style.display = 'none';
            statusText.innerText = 'Analyzing session...';
            statusBadge.classList.replace('recording', 'generating');
            statusPulse.classList.remove('pulse');
            visualizer.style.display = 'none';

            soapContent.innerHTML = `
            <div class="skeleton-wrapper">
                <div class="skeleton-content">
                    <div class="bouncing-squares">
                        <div class="square square-1"></div>
                        <div class="square square-2"></div>
                        <div class="square square-3"></div>
                    </div>
                    <span>Generating Professional Clinical Documentation...</span>
                </div>
            </div>`;

            setTimeout(() => { startBtn.style.display = 'flex'; startBtn.innerText = 'New Session'; isStopping = false; }, 2000);
        }

        startBtn.onclick = () => {
            if (ws) ws.close();
            transcriptArea.innerHTML = '';
            activeParagraph = null;
            liveCaptionBubble = null;

            soapContent.innerText = 'The summary will be generated automatically at the end of the session.';
            startBtn.innerHTML = 'Start Session';
            startSession();
        };
        stopBtn.onclick = stopRecording;
    </script>
</body>

</html>
